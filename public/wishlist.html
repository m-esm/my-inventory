<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>To buy · Moshe's Inventory</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='88'>🛒</text></svg>" />
<meta name="theme-color" content="#0a0e13" />
<meta name="description" content="Purchase requests — parts to buy for Moshe's electronics inventory." />
<style>
  :root {
    color-scheme: dark;
    --bg: #0a0e13; --panel: #11161d; --panel2: #161b22; --line: #1f2730;
    --line2: #2a3340; --text: #e6edf3; --dim: #768390; --dim2: #9aa7b4;
    --blue: #2f81f7; --bluebg: #1f6feb22; --bluefg: #79c0ff;
    --green: #238636; --green2: #2ea043; --red: #da3633; --redbg: #f8514922;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.45 -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); }
  button { font: inherit; cursor: pointer; }
  input, select, textarea { font: inherit; }
  a { color: inherit; }

  header {
    padding: 14px 26px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; background: #0a0e13ee; backdrop-filter: blur(10px); z-index: 20;
  }
  h1 { font-size: 16px; margin: 0; display: flex; align-items: center; gap: 8px; font-weight: 650;
       background: linear-gradient(90deg, #e6edf3, #79c0ff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .hactions { display: flex; gap: 8px; margin-left: auto; }
  .btn { border-radius: 9px; border: 1px solid var(--line2); background: var(--panel2); color: var(--text); padding: 9px 14px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
  .btn:hover { border-color: #3a4654; }
  .btn.primary { background: var(--green); border-color: var(--green2); font-weight: 600; }
  .btn.primary:hover { background: #2ea043; }
  body:not(.admin) #wl-add-btn { display: none; }

  main { padding: 22px 26px 80px; max-width: 820px; margin: 0 auto; }
  .lead { color: var(--dim); font-size: 13px; margin: 0 0 16px; }

  /* wishlist / "to buy" */
  .wl-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .wl-title { font-size: 15px; font-weight: 650; color: #9db6ff; display: flex; align-items: center; gap: 8px; }
  .wl-count { font-size: 11px; color: var(--dim); background: #1b2740; border: 1px solid #2a3550; padding: 1px 8px; border-radius: 999px; font-weight: 600; }
  .wl-head .btn { margin-left: auto; padding: 7px 12px; font-size: 13px; }
  .wl-list { display: flex; flex-direction: column; gap: 8px; }
  .wl-card { display: flex; gap: 12px; align-items: flex-start; padding: 12px 14px; border: 1px solid var(--line2); background: var(--panel2); border-radius: 12px; }
  .wl-card.done { opacity: .55; }
  .wl-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .wl-part { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .wl-qty { color: var(--dim2); font-weight: 600; }
  .wl-meta { font-size: 12px; color: var(--dim2); }
  .wl-meta .proj { color: #9db6ff; font-weight: 600; }
  .wl-reason { font-size: 13px; color: var(--dim); }
  .wl-right { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
  .wl-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; padding: 2px 8px; border-radius: 999px; }
  .wl-badge.st-requested { background: #1f6feb22; color: #79c0ff; }
  .wl-badge.st-ordered { background: #bb800922; color: #e3b341; }
  .wl-badge.st-bought { background: #23863622; color: #3fb950; }
  .wl-right select { border-radius: 8px; border: 1px solid var(--line2); background: var(--panel); color: var(--text); padding: 5px 8px; font-size: 12px; }
  .wl-right .wl-del { background: none; border: 1px solid transparent; color: var(--dim); width: 28px; height: 28px; border-radius: 8px; font-size: 15px; }
  .wl-right .wl-del:hover { color: #ff7b72; border-color: #da363366; background: var(--redbg); }
  .wl-type { font-size: 11px; padding: 2px 9px; border-radius: 999px; background: #2a334066; color: var(--dim2); }
  .empty { text-align: center; color: var(--dim); padding: 50px 20px; }
  .empty .big { font-size: 40px; margin-bottom: 10px; }

  /* modal */
  .overlay { position: fixed; inset: 0; background: #00000099; backdrop-filter: blur(3px); display: none;
             align-items: center; justify-content: center; z-index: 50; padding: 20px; }
  .overlay.show { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--line2); border-radius: 16px; width: 100%; max-width: 480px;
           max-height: 92vh; overflow: auto; }
  .modal h3 { margin: 0; padding: 18px 20px; border-bottom: 1px solid var(--line); font-size: 16px; }
  .modal .form { padding: 18px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .modal .form .full { grid-column: 1 / -1; }
  .field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--dim); margin-bottom: 5px; }
  .field input, .field select, .field textarea {
    width: 100%; border-radius: 9px; border: 1px solid var(--line2); background: var(--panel2); color: var(--text); padding: 9px 11px; }
  .field textarea { resize: vertical; min-height: 64px; }
  .modal .foot { display: flex; gap: 10px; padding: 16px 20px; border-top: 1px solid var(--line); align-items: center; }
  .modal .foot .spacer { flex: 1; }
  .status-line { color: var(--dim); font-size: 12px; }

  /* toast */
  .toasts { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 80; }
  .toast { background: var(--panel2); border: 1px solid var(--line2); border-left: 3px solid var(--green2);
           padding: 11px 16px; border-radius: 10px; font-size: 14px; box-shadow: 0 8px 24px #0008; animation: rise .2s ease; }
  .toast.err { border-left-color: var(--red); }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } }

  @media (max-width: 620px) {
    header { padding: 11px 14px; }
    main { padding: 16px 14px 70px; }
    input, select, textarea { font-size: 16px; }
  }
</style>
</head>
<body>
  <header>
    <h1>🛒 To buy</h1>
    <div class="hactions">
      <a class="btn" href="/dashboard">📦 Inventory</a>
      <button class="btn" id="login-btn">Log in</button>
    </div>
  </header>

  <main>
    <p class="lead">Parts to buy and add to the inventory. Anyone can request a part; managing the list (status, delete) needs admin login.</p>
    <section id="wishlist">
      <div class="wl-head">
        <span class="wl-title">Requests <span class="wl-count" id="wl-count"></span></span>
        <button class="btn primary" id="wl-add-btn">+ Request part</button>
      </div>
      <div class="wl-list" id="wl-list"></div>
    </section>
  </main>

  <!-- request a part to buy -->
  <div class="overlay" id="wl-overlay">
    <div class="modal" style="max-width:480px">
      <h3>Request a part to buy</h3>
      <div class="form">
        <div class="field full"><label>Part <span style="text-transform:none;letter-spacing:0;color:var(--dim)">— what to buy</span></label><input id="w-part" placeholder="e.g. 10kΩ 1/4W resistor (100-pack)"></div>
        <div class="field"><label>Project</label><input id="w-project" placeholder="e.g. soil logger"></div>
        <div class="field"><label>Type of product</label><input id="w-type" placeholder="e.g. Resistor"></div>
        <div class="field"><label>Quantity</label><input id="w-quantity" type="number" min="1" value="1"></div>
        <div class="field"><label>Requested by</label><input id="w-by" placeholder="optional"></div>
        <div class="field full"><label>Reason</label><textarea id="w-reason" placeholder="Why it's needed / what it's for…"></textarea></div>
      </div>
      <div class="foot">
        <div class="status-line" id="w-status"></div>
        <div class="spacer"></div>
        <button class="btn" id="w-cancel">Cancel</button>
        <button class="btn primary" id="w-submit">Request</button>
      </div>
    </div>
  </div>

  <!-- login -->
  <div class="overlay" id="login-overlay">
    <div class="modal" style="max-width:380px">
      <h3 id="l-title">Log in to manage</h3>
      <div class="form" style="grid-template-columns:1fr">
        <div class="field full"><label>Username</label><input id="l-user" autocomplete="username"></div>
        <div class="field full"><label>Password</label><input id="l-pass" type="password" autocomplete="current-password"></div>
        <div class="field full"><div class="status-line" id="l-status">Requesting is public — log in to manage the list.</div></div>
      </div>
      <div class="foot">
        <div class="spacer"></div>
        <button class="btn" id="l-cancel">Cancel</button>
        <button class="btn primary" id="l-submit">Log in</button>
      </div>
    </div>
  </div>

  <div class="toasts" id="toasts"></div>

<script>
let WISHLIST = [];
let lastWishlistJSON = '';
// Persistent login: stored in localStorage so it survives tab/browser close.
let authHeader = localStorage.getItem('authHeader') || sessionStorage.getItem('authHeader') || '';
if (authHeader) { localStorage.setItem('authHeader', authHeader); sessionStorage.removeItem('authHeader'); }
let isAdmin = false;
let authConfigured = false;
let authMode = 'login';
const WL_STATUSES = ['requested', 'ordered', 'bought'];
const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function toast(msg, err) {
  const t = document.createElement('div');
  t.className = 'toast' + (err ? ' err' : '');
  t.textContent = msg;
  $('toasts').appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 2200);
}
async function api(path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (authHeader) headers['Authorization'] = authHeader;
  const r = await fetch(path, { method: 'POST', headers, body: JSON.stringify(body) });
  if (r.status === 401) { isAdmin = false; applyAuthUI(); toast('Session expired — log in again', true); }
  return r.json();
}

// ---- auth / login ----
async function checkAuth() {
  let j = {};
  try {
    const headers = authHeader ? { 'Authorization': authHeader } : {};
    j = await (await fetch('/api/login', { method: 'POST', headers })).json();
  } catch (e) {}
  authConfigured = !!j.authConfigured;
  const isLocal = ['localhost', '127.0.0.1', ''].includes(location.hostname);
  isAdmin = authConfigured ? !!j.ok : isLocal;
  applyAuthUI();
}
function applyAuthUI() {
  document.body.classList.toggle('admin', isAdmin);
  $('login-btn').textContent = isAdmin ? 'Log out' : (authConfigured ? 'Log in' : 'Set up admin');
  lastWishlistJSON = '';
  renderWishlist(WISHLIST);
}
function openAuth(mode) {
  authMode = mode;
  $('l-title').textContent = mode === 'setup' ? 'Create the admin account' : 'Log in to manage';
  $('l-status').textContent = mode === 'setup'
    ? 'No admin yet — pick a username & password to claim it.'
    : 'Requesting is public — log in to manage the list.';
  $('l-submit').textContent = mode === 'setup' ? 'Create & log in' : 'Log in';
  $('l-user').value = ''; $('l-pass').value = '';
  $('login-overlay').classList.add('show'); $('l-user').focus();
}
$('login-btn').addEventListener('click', () => {
  if (isAdmin) {
    authHeader = ''; localStorage.removeItem('authHeader'); isAdmin = false;
    applyAuthUI(); toast('Logged out');
  } else { openAuth(authConfigured ? 'login' : 'setup'); }
});
$('l-cancel').addEventListener('click', () => $('login-overlay').classList.remove('show'));
$('login-overlay').addEventListener('click', e => { if (e.target === $('login-overlay')) $('login-overlay').classList.remove('show'); });
async function doAuth() {
  const user = $('l-user').value.trim(), pass = $('l-pass').value;
  if (!user || !pass) { $('l-status').textContent = 'Enter a username and password.'; return; }
  const hdr = 'Basic ' + btoa(user + ':' + pass);
  $('l-status').textContent = authMode === 'setup' ? 'Creating…' : 'Checking…';
  try {
    if (authMode === 'setup') {
      const s = await (await fetch('/api/setup', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass }) })).json();
      if (!s.ok) { $('l-status').textContent = '❌ ' + (s.error || 'setup failed'); return; }
      authConfigured = true;
    }
    const j = await (await fetch('/api/login', { method: 'POST', headers: { 'Authorization': hdr } })).json();
    if (j.ok) {
      authHeader = hdr; localStorage.setItem('authHeader', hdr); isAdmin = true; authConfigured = true;
      $('login-overlay').classList.remove('show'); applyAuthUI();
      toast(authMode === 'setup' ? 'Admin created — logged in' : 'Logged in');
    } else { $('l-status').textContent = '❌ Wrong username or password.'; }
  } catch (e) { $('l-status').textContent = 'Error: ' + e.message; }
}
$('l-submit').addEventListener('click', doAuth);
$('l-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(); });

// ---- wishlist render ----
function renderWishlist(list) {
  WISHLIST = list || [];
  const box = $('wl-list');
  if (document.activeElement && document.activeElement.closest && document.activeElement.closest('#wishlist')) return;
  const json = JSON.stringify(WISHLIST) + '|' + isAdmin;
  if (json === lastWishlistJSON) return;
  lastWishlistJSON = json;
  const open = WISHLIST.filter(w => w.status !== 'bought').length;
  $('wl-count').textContent = WISHLIST.length ? (open ? `${open} open` : 'all bought') : 'none yet';
  const sorted = WISHLIST.slice().sort((a, b) =>
    (a.status === 'bought') - (b.status === 'bought') || (b.created || 0) - (a.created || 0));
  box.innerHTML = sorted.length ? sorted.map(w => {
    const st = WL_STATUSES.includes(w.status) ? w.status : 'requested';
    const qty = (w.quantity && w.quantity > 1) ? `<span class="wl-qty">×${esc(w.quantity)}</span>` : '';
    const bits = [];
    if (w.project) bits.push(`<span class="proj">${esc(w.project)}</span>`);
    if (w.requested_by) bits.push(`by ${esc(w.requested_by)}`);
    return `<div class="wl-card ${st === 'bought' ? 'done' : ''}" data-id="${esc(w.id)}">
      <div class="wl-main">
        <div class="wl-part">${esc(w.part || '(unspecified part)')} ${qty}
          ${w.type ? `<span class="wl-type">${esc(w.type)}</span>` : ''}</div>
        ${bits.length ? `<div class="wl-meta">${bits.join(' · ')}</div>` : ''}
        ${w.reason ? `<div class="wl-reason">${esc(w.reason)}</div>` : ''}
      </div>
      <div class="wl-right">
        ${isAdmin
          ? `<select data-act="status">${WL_STATUSES.map(s =>
              `<option value="${s}" ${s === st ? 'selected' : ''}>${s}</option>`).join('')}</select>
             <button class="wl-del" data-act="del" title="Delete request">🗑</button>`
          : `<span class="wl-badge st-${st}">${st}</span>`}
      </div>
    </div>`;
  }).join('') : `<div class="empty"><div class="big">🛒</div><div>Nothing requested yet. ${isAdmin ? 'Hit <b>+ Request part</b> or ask via the MCP agent.' : 'Anyone can add one with <b>+ Request part</b>.'}</div></div>`;
}
$('wl-list').addEventListener('change', async e => {
  const sel = e.target.closest('select[data-act="status"]'); if (!sel) return;
  const id = sel.closest('.wl-card')?.dataset.id; if (!id) return;
  const res = await api('/api/wishlist/resolve', { id, action: 'update', status: sel.value });
  if (res.ok) { toast(`Marked ${sel.value}`); lastWishlistJSON = ''; setTimeout(poll, 600); }
  else toast('Update failed', true);
});
$('wl-list').addEventListener('click', async e => {
  const b = e.target.closest('button[data-act="del"]'); if (!b) return;
  const card = b.closest('.wl-card'); const id = card?.dataset.id; if (!id) return;
  const w = WISHLIST.find(x => x.id === id);
  if (!confirm(`Remove request "${w?.part || 'this'}"?`)) return;
  const res = await api('/api/wishlist/resolve', { id, action: 'delete' });
  if (res.ok) { WISHLIST = WISHLIST.filter(x => x.id !== id); toast('Removed'); lastWishlistJSON = ''; renderWishlist(WISHLIST); }
  else toast('Delete failed', true);
});

// ---- request modal ----
function openWishAdd() {
  ['part','project','type','by','reason'].forEach(f => $('w-'+f).value = '');
  $('w-quantity').value = 1; $('w-status').textContent = '';
  $('wl-overlay').classList.add('show'); $('w-part').focus();
}
$('wl-add-btn').addEventListener('click', openWishAdd);
$('w-cancel').addEventListener('click', () => $('wl-overlay').classList.remove('show'));
$('wl-overlay').addEventListener('click', e => { if (e.target === $('wl-overlay')) $('wl-overlay').classList.remove('show'); });
async function submitWish() {
  const part = $('w-part').value.trim();
  if (!part) { $('w-status').textContent = 'Part is required.'; return; }
  $('w-status').textContent = 'Saving…';
  const res = await api('/api/wishlist', {
    part, project: $('w-project').value.trim(), type: $('w-type').value.trim(),
    reason: $('w-reason').value.trim(), quantity: Number($('w-quantity').value) || 1,
    requested_by: $('w-by').value.trim(),
  });
  if (res.ok) { $('wl-overlay').classList.remove('show'); toast('Request added'); lastWishlistJSON = ''; setTimeout(poll, 400); }
  else $('w-status').textContent = 'Failed: ' + (res.error || 'error');
}
$('w-submit').addEventListener('click', submitWish);
['w-part','w-project','w-type','w-quantity','w-by'].forEach(id =>
  $(id).addEventListener('keydown', e => { if (e.key === 'Enter') submitWish(); }));

async function poll() {
  try { renderWishlist(((await (await fetch('/api/wishlist')).json()).wishlist) || []); } catch (e) {}
  setTimeout(poll, 1500);
}
checkAuth();
poll();
</script>
</body>
</html>
